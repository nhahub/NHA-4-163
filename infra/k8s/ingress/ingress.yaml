apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-api
  namespace: healthcare
  labels:
    app: healthcare-api
  annotations:
    # NGINX Ingress Controller on AKS (install via Helm or the AKS
    # "Web Application Routing" add-on).
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP

    # TLS via cert-manager (issues/renews a Let's Encrypt certificate).
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Security headers + health check
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.healthcare-internal.example.com
      secretName: healthcare-api-tls
  rules:
    - host: api.healthcare-internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcare-api
                port:
                  name: http
