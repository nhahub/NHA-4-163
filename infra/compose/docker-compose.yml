# Healthcare Hereditary Disease Prediction System — Local Dev
#
# Base services start by default. Opt-in groups via profiles:
#   --profile orchestration   Airflow (added Phase 3)
#
# Usage:
#   docker compose -f infra/compose/docker-compose.yml up -d
#   make up   (recommended — also runs check-env)

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# ── Airflow shared config (opt-in via --profile orchestration) ────────────────
# Custom image (infra/docker/airflow.Dockerfile) adds the DAG tasks' runtime
# deps; project source is mounted at /opt/airflow and exposed via PYTHONPATH.
x-airflow-common: &airflow-common
  build:
    context: ../..
    dockerfile: infra/docker/airflow.Dockerfile
  image: healthcare-airflow:2.9.1
  profiles: ["orchestration"]
  logging: *default-logging

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-healthcare_app}:${POSTGRES_PASSWORD}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY is required}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  # Put mounted project source (libs/, pipelines/, ml/) on the import path so
  # DAG tasks can `import libs.*`, `import pipelines.*`, `import ml.*`.
  PYTHONPATH: /opt/airflow
  # Downstream service connection details consumed by task code.
  POSTGRES_HOST: postgres
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-healthcare}
  POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-healthcare-raw}
  MINIO_BUCKET_DELTA: ${MINIO_BUCKET_DELTA:-healthcare-delta}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
  MLFLOW_TRACKING_URI: http://mlflow:5000

x-airflow-volumes: &airflow-volumes
  - ../../pipelines/airflow/dags:/opt/airflow/dags:ro
  - ../../libs:/opt/airflow/libs:ro
  - ../../pipelines:/opt/airflow/pipelines:ro
  - ../../ml:/opt/airflow/ml:ro
  - airflow_logs:/opt/airflow/logs

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../schemas/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare_app} -d ${POSTGRES_DB:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    <<: *default-restart
    logging: *default-logging
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1g"
      NEO4J_server_memory_pagecache_size: "512m"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ../../schemas/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    <<: *default-restart
    logging: *default-logging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Zookeeper version:'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    <<: *default-restart
    logging: *default-logging
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Schema Registry ──────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    <<: *default-restart
    logging: *default-logging
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    <<: *default-restart
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO bucket initializer (runs once then exits) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/$${MINIO_BUCKET_RAW:-healthcare-raw};
        mc mb --ignore-existing local/$${MINIO_BUCKET_DELTA:-healthcare-delta};
        mc mb --ignore-existing local/mlflow-artifacts;
        echo 'MinIO buckets ready';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-healthcare-raw}
      MINIO_BUCKET_DELTA: ${MINIO_BUCKET_DELTA:-healthcare-delta}
    restart: "no"

  # ── Spark Master ─────────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    <<: *default-restart
    logging: *default-logging
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Spark Worker ─────────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1
    <<: *default-restart
    logging: *default-logging
    depends_on:
      spark-master:
        condition: service_healthy
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8083:8081"

  # ── MLflow Tracking Server ───────────────────────────────────────────────────
  mlflow:
    build:
      context: ../..
      dockerfile: infra/docker/mlflow.Dockerfile
    image: healthcare-mlflow:latest
    <<: *default-restart
    logging: *default-logging
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
        --backend-store-uri sqlite:////tmp/mlflow.db
        --artifacts-destination s3://mlflow-artifacts
        --host 0.0.0.0
        --port 5000
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Healthcare Prediction API ────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    <<: *default-restart
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # MLflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      # Application
      APP_ENV: ${APP_ENV:-development}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      # Model registry
      MODEL_NAME: ${MODEL_NAME:-hereditary-risk-xgboost}
      MODEL_STAGE: ${MODEL_STAGE:-Staging}
      # Feature flags
      ENABLE_SYMPTOM_MODEL: ${ENABLE_SYMPTOM_MODEL:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ── Airflow — opt-in via --profile orchestration ────────────────────────────
  # Usage:
  #   docker compose -f infra/compose/docker-compose.yml --profile orchestration up -d
  #   make orchestration-up

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username $$_AIRFLOW_WWW_USER_USERNAME --password $$_AIRFLOW_WWW_USER_PASSWORD --firstname Admin --lastname User --role Admin --email admin@healthcare.local || true"
    volumes: *airflow-volumes
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment: *airflow-env
    volumes: *airflow-volumes
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      airflow-scheduler:
        condition: service_healthy
    command: webserver
    environment: *airflow-env
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    volumes: *airflow-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Prometheus — opt-in via --profile observability ──────────────────────────
  # Usage:
  #   docker compose -f infra/compose/docker-compose.yml --profile observability up -d
  #   make observability-up

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observability"]
    <<: *default-restart
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observability"]
    <<: *default-restart
    logging: *default-logging
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3000}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Streamlit Web Interface ───────────────────────────────────────────────────
  streamlit:
    build:
      context: ../..
      dockerfile: infra/docker/streamlit.Dockerfile
    <<: *default-restart
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # MLflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Application
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../ml:/app/ml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  redis_data:
  airflow_logs:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: healthcare-net
    driver: bridge
