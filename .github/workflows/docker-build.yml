name: Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/docker/**"
      - "libs/**"
      - "ml/**"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: healthcare/healthcare-api
  K8S_NAMESPACE: healthcare
  K8S_DEPLOYMENT: healthcare-api

jobs:
  # ── Build & push to ECR ───────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC token for AWS authentication
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Compute image URI for downstream jobs
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${SHORT_SHA}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Image URI: ${IMAGE_URI}"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.uri }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    # Run on push to main, or when manually triggered with staging/production
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'production')
    environment:
      name: staging
      url: https://api.staging.healthcare-internal.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for staging cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name healthcare-staging-eks

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/api/
          kubectl apply -f infra/k8s/ingress/
          kubectl apply -f infra/k8s/monitoring/

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            api=${{ needs.build-and-push.outputs.image_uri }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Smoke test
        run: |
          LB=$(kubectl get ingress healthcare-api -n ${{ env.K8S_NAMESPACE }} \
                 -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$LB" ]; then
            echo "WARNING: No load balancer hostname found, skipping smoke test"
            exit 0
          fi
          curl --fail --retry 5 --retry-delay 10 \
            "https://${LB}/health" \
            -H "Host: api.staging.healthcare-internal.example.com" \
            --insecure

  # ── Promote to Production (manual approval gate) ──────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    # Only deploy to production when explicitly requested via workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.healthcare-internal.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for production cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name healthcare-production-eks

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/api/
          kubectl apply -f infra/k8s/ingress/
          kubectl apply -f infra/k8s/monitoring/

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            api=${{ needs.build-and-push.outputs.image_uri }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=10m

      - name: Smoke test
        run: |
          LB=$(kubectl get ingress healthcare-api -n ${{ env.K8S_NAMESPACE }} \
                 -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$LB" ]; then
            echo "WARNING: No load balancer hostname found, skipping smoke test"
            exit 0
          fi
          curl --fail --retry 5 --retry-delay 15 \
            "https://${LB}/health" \
            -H "Host: api.healthcare-internal.example.com" \
            --insecure
