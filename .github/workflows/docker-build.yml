name: Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/docker/**"
      - "libs/**"
      - "ml/**"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  ACR_NAME: ${{ vars.ACR_NAME }} # e.g. healthcarestagingacr
  ACR_REPOSITORY: healthcare/healthcare-api
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }} # e.g. healthcare-staging-rg
  AKS_CLUSTER: ${{ vars.AKS_CLUSTER }} # e.g. healthcare-staging-aks
  K8S_NAMESPACE: healthcare
  K8S_DEPLOYMENT: healthcare-api

jobs:
  # ── Build & push to Azure Container Registry ──────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for Azure authentication
      contents: read
    outputs:
      configured: ${{ steps.creds.outputs.configured }}
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Azure credentials
        id: creds
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && [ -n "${{ vars.ACR_NAME }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure credentials/variables not configured — skipping build, push, and deploy. Set AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_SUBSCRIPTION_ID secrets and ACR_NAME/AZURE_RESOURCE_GROUP/AKS_CLUSTER variables to enable."
          fi

      - name: Compute image tag
        id: meta
        if: steps.creds.outputs.configured == 'true'
        run: echo "tag=sha-$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        if: steps.creds.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        if: steps.creds.outputs.configured == 'true'
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Set up Docker Buildx
        if: steps.creds.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.creds.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan image with Trivy
        if: steps.creds.outputs.configured == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: steps.creds.outputs.configured == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      needs.build-and-push.outputs.configured == 'true' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'production'))
    environment:
      name: staging
      url: https://api.staging.healthcare-internal.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AKS_CLUSTER }}" \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/api/
          kubectl apply -f infra/k8s/ingress/
          kubectl apply -f infra/k8s/monitoring/

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            api=${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

  # ── Promote to Production (manual approval gate) ──────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: |
      needs.build-and-push.outputs.configured == 'true' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.healthcare-internal.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AKS_CLUSTER }}" \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/api/
          kubectl apply -f infra/k8s/ingress/
          kubectl apply -f infra/k8s/monitoring/

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            api=${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=10m
