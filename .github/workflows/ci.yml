name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting deps
        run: pip install ruff black mypy

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        run: mypy libs/ services/ pipelines/ ml/

  # ── Secret scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -e "libs/common[dev]" 2>/dev/null || pip install -r libs/common/requirements.txt 2>/dev/null || true

      - name: Run unit tests
        run: pytest tests/unit/ -m unit --cov=libs --cov=services --cov=pipelines --cov=ml --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Terraform validate ────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate & Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose syntax
        run: |
          docker compose -f infra/compose/docker-compose.yml config --quiet

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: healthcare-api:ci

  # ── Container image scanning ─────────────────────────────────────────────────
  trivy-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on docker-compose images
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/compose/
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  # ── Integration tests (only on push to main/staging) ────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit, docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    env:
      POSTGRES_PASSWORD: ci_test_password
      NEO4J_PASSWORD: ci_test_password
      MINIO_SECRET_KEY: ci_test_password
      REDIS_PASSWORD: ci_test_password
      POSTGRES_DB: healthcare_test
      POSTGRES_USER: healthcare_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Start services
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=ci_test_password" >> .env
          echo "NEO4J_PASSWORD=ci_test_password" >> .env
          echo "MINIO_SECRET_KEY=ci_test_password" >> .env
          echo "REDIS_PASSWORD=ci_test_password" >> .env
          docker compose -f infra/compose/docker-compose.yml up -d --wait || true

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose -f infra/compose/docker-compose.yml ps | grep -v "Exit\|Restarting"; do sleep 5; done'

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run integration tests
        run: pytest tests/integration/ -m integration --timeout=120

      - name: Tear down services
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml down -v
