name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
  # Integration tests spin up the full service stack, which needs more resources
  # than a standard hosted runner — run them on demand rather than every push.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting deps + project stubs
        run: |
          pip install ruff black mypy
          pip install -r requirements.txt
          pip install types-requests

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        run: mypy libs/ services/ pipelines/ ml/ --ignore-missing-imports

  # ── Secret scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-asyncio httpx aiosqlite

      - name: Run unit tests
        run: |
          pytest tests/unit/ -m unit \
            --cov=libs --cov=services --cov=pipelines --cov=ml \
            --cov-report=xml \
            --cov-fail-under=75

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Terraform validate ────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate & Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env for compose validation
        run: |
          cp .env.example .env
          sed -i 's/change_me_postgres/ci_password/g' .env
          sed -i 's/change_me_neo4j/ci_password/g' .env
          sed -i 's/change_me_minio/ci_password/g' .env
          sed -i 's/change_me_redis/ci_password/g' .env
          sed -i 's/change_me_airflow_admin/ci_password/g' .env
          sed -i 's/change_me_airflow_webserver_secret/ci_secret_key_32chars_minimum_xx/g' .env
          sed -i 's/change_me_generate_with_fernet/gAAAAABleGFtcGxlRmVybmV0S2V5/g' .env
          sed -i 's/change_me_grafana_admin/ci_password/g' .env
          sed -i 's/change_me_app_secret_32chars_min/ci_secret_key_32chars_minimum_xx/g' .env

      - name: Validate docker-compose syntax
        # The compose file lives in infra/compose/, so Compose looks for its
        # .env there by default — point it at the repo-root .env explicitly.
        run: |
          docker compose --env-file .env -f infra/compose/docker-compose.yml config --quiet

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: healthcare-api:ci

      - name: Scan image with Trivy
        # Report vulnerabilities for visibility but do not fail the build on
        # base-image CVEs that are outside our control (student/dev pipeline).
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: healthcare-api:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

  # ── Integration tests (manual dispatch only) ────────────────────────────────
  # Brings up the entire Compose stack (Postgres, Neo4j, Kafka, Spark, MinIO,
  # MLflow, Redis) which exceeds the resources of a standard hosted runner, so
  # this is opt-in via "Run workflow" rather than blocking every push.
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit, docker-build]
    if: github.event_name == 'workflow_dispatch'
    env:
      POSTGRES_PASSWORD: ci_test_password
      NEO4J_PASSWORD: ci_test_password
      MINIO_SECRET_KEY: ci_test_password
      REDIS_PASSWORD: ci_test_password
      APP_SECRET_KEY: ci_test_secret_key_32chars_min_x
      POSTGRES_DB: healthcare_test
      POSTGRES_USER: healthcare_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Create .env for services
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=ci_test_password" >> .env
          echo "NEO4J_PASSWORD=ci_test_password" >> .env
          echo "MINIO_SECRET_KEY=ci_test_password" >> .env
          echo "REDIS_PASSWORD=ci_test_password" >> .env
          echo "APP_SECRET_KEY=ci_test_secret_key_32chars_min_x" >> .env

      - name: Start services
        run: |
          docker compose --env-file .env -f infra/compose/docker-compose.yml up -d --wait --timeout 120

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          for i in $(seq 1 24); do
            UNHEALTHY=$(docker compose --env-file .env -f infra/compose/docker-compose.yml ps --format json | \
              python3 -c "import sys,json; data=[json.loads(l) for l in sys.stdin if l.strip()]; print(sum(1 for s in data if s.get('Health','') not in ('healthy','')))" 2>/dev/null || echo "0")
            if [ "$UNHEALTHY" = "0" ]; then
              echo "All services healthy!"
              break
            fi
            echo "  Waiting... ($UNHEALTHY services not yet healthy)"
            sleep 5
          done
          docker compose --env-file .env -f infra/compose/docker-compose.yml ps

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-asyncio httpx aiosqlite

      - name: Run integration tests
        run: pytest tests/integration/ -m integration --timeout=120

      - name: Tear down services
        if: always()
        run: docker compose --env-file .env -f infra/compose/docker-compose.yml down -v
